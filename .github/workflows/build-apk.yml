name: Build Android APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # AGP 9.1.1 requires Gradle 8.11+ — pin to 8.14 explicitly
      # (no gradlew wrapper in this project, so we use the global gradle command)
      - name: Setup Gradle 9.3.1
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.3.1'

      # debug.keystore is in .gitignore so it won't be in the repo.
      # Generate a throwaway one for CI so the debugConfig signing doesn't fail.
      - name: Generate debug keystore
        run: |
          keytool -genkey -v \
            -keystore debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      # compileSdk uses API 36 — install it if the runner doesn't have it yet
      - name: Install Android SDK 36
        run: |
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-36" \
            "build-tools;36.0.0" 2>/dev/null || true

      - name: Build debug APK
        run: gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: gumm-debug
          path: app/build/outputs/apk/debug/*.apk
          
